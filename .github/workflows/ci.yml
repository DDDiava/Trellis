name: CI

on:
  push:
    branches: [main, feat/v0.5.0-beta]
    paths:
      - 'packages/cli/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, feat/v0.5.0-beta]
    paths:
      - 'packages/cli/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify build output
        run: |
          test -d packages/cli/dist
          test -f packages/cli/dist/index.js
          echo "Build verification passed"
